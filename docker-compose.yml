services:
  # 1. База даних PostgreSQL
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: finance_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # 2. Наш Backend
  server:
    build: ./server
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://postgres:rootpassword@db:5432/finance_db?schema=public
      - JWT_SECRET=super_secret_docker_jwt_key_123
      - PORT=5000
      - CLIENT_URL=http://localhost:5173
    depends_on:
      - db
    # Запускаємо міграції перед стартом сервера, щоб БД була готова
    command: sh -c "npx prisma migrate deploy && npm run dev"

  # 3. Наш Frontend
  client:
    build: ./client
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000/api
    depends_on:
      - server

volumes:
  pgdata: